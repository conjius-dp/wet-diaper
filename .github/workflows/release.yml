name: Release

# Manual, tag-driven release. To cut a release:
#   git tag vX.Y.Z
#   git push origin vX.Y.Z
# The workflow reads the version from the tag, builds the artifacts, and
# publishes a GitHub release. No auto-bump, no nightlies.
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  actions: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - name: Extract version from tag
        id: v
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Releasing $TAG"

  build-macos:
    needs: version
    runs-on: macos-15
    env:
      VERSION: ${{ needs.version.outputs.version }}

    steps:
      - name: Checkout (tag)
        uses: actions/checkout@v4

      - name: Patch CMakeLists version to match tag
        run: |
          CURRENT=$(sed -n 's/.*project(WetDiaper VERSION \([0-9]*\.[0-9]*\.[0-9]*\)).*/\1/p' CMakeLists.txt)
          if [ "$CURRENT" != "$VERSION" ]; then
            sed -i '' "s/project(WetDiaper VERSION ${CURRENT})/project(WetDiaper VERSION ${VERSION})/" CMakeLists.txt
          fi

      - name: Install ccache
        run: brew install ccache

      - name: Cache JUCE
        id: cache-juce
        uses: actions/cache@v4
        with:
          path: JUCE
          key: juce-8.0.12

      - name: Clone JUCE
        if: steps.cache-juce.outputs.cache-hit != 'true'
        run: git clone --depth 1 --branch 8.0.12 https://github.com/juce-framework/JUCE.git JUCE

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/ccache
          key: ccache-release-${{ hashFiles('Source/**', 'CMakeLists.txt') }}
          restore-keys: ccache-release-

      - name: Configure (Release)
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DCMAKE_C_COMPILER_LAUNCHER=ccache

      - name: Build plugin + screenshot (parallel)
        run: cmake --build build --target WetDiaper_VST3 WetDiaper_AU WetDiaperScreenshot

      - name: Render screenshot PNG
        run: ./build/WetDiaperScreenshot screenshot.png

      - name: Zip VST3
        run: |
          cd build/WetDiaper_artefacts/Release/VST3
          zip -r "$GITHUB_WORKSPACE/WetDiaper-macOS-VST3.zip" wet-diaper.vst3

      - name: Zip AU
        run: |
          cd build/WetDiaper_artefacts/Release/AU
          zip -r "$GITHUB_WORKSPACE/WetDiaper-macOS-AU.zip" wet-diaper.component

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            WetDiaper-macOS-VST3.zip
            WetDiaper-macOS-AU.zip

      - name: Upload screenshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: screenshot
          path: screenshot.png

      - name: Cancel workflow if this job failed
        if: failure()
        uses: andymckay/cancel-action@0.5

  build-windows:
    needs: version
    runs-on: windows-latest
    env:
      VERSION: ${{ needs.version.outputs.version }}
      # Local disk cache for sccache (GHA backend is flaky).
      SCCACHE_DIR: ${{ github.workspace }}\sccache
      SCCACHE_CACHE_SIZE: 2G

    steps:
      - name: Checkout (tag)
        uses: actions/checkout@v4

      - name: Patch CMakeLists version to match tag
        shell: bash
        run: |
          CURRENT=$(sed -n 's/.*project(WetDiaper VERSION \([0-9]*\.[0-9]*\.[0-9]*\)).*/\1/p' CMakeLists.txt)
          if [ "$CURRENT" != "$VERSION" ]; then
            sed -i "s/project(WetDiaper VERSION ${CURRENT})/project(WetDiaper VERSION ${VERSION})/" CMakeLists.txt
          fi

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Setup MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cache JUCE
        id: cache-juce
        uses: actions/cache@v4
        with:
          path: JUCE
          key: juce-8.0.12

      - name: Clone JUCE
        if: steps.cache-juce.outputs.cache-hit != 'true'
        run: git clone --depth 1 --branch 8.0.12 https://github.com/juce-framework/JUCE.git JUCE

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: sccache-release-windows-${{ hashFiles('Source/**', 'CMakeLists.txt') }}
          restore-keys: sccache-release-windows-

      - name: Cache CMake build directory
        uses: actions/cache@v4
        with:
          path: build
          key: build-release-windows-${{ hashFiles('Source/**', 'Tools/**', 'CMakeLists.txt', '.github/workflows/release.yml') }}
          restore-keys: build-release-windows-

      - name: Configure (Release)
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER_LAUNCHER=sccache -DCMAKE_C_COMPILER_LAUNCHER=sccache

      - name: Build VST3
        run: cmake --build build --target WetDiaper_VST3

      - name: Zip VST3
        shell: pwsh
        run: Compress-Archive -Path "build\WetDiaper_artefacts\Release\VST3\wet-diaper.vst3" -DestinationPath "WetDiaper-Windows-VST3.zip"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: WetDiaper-Windows-VST3.zip

      - name: Cancel workflow if this job failed
        if: failure()
        uses: andymckay/cancel-action@0.5

  release:
    needs: [version, build-macos, build-windows]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.version.outputs.version }}
      TAG: ${{ needs.version.outputs.tag }}

    steps:
      - name: Checkout (tag)
        uses: actions/checkout@v4

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-artifacts

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts

      - name: Download screenshot artifact
        uses: actions/download-artifact@v4
        with:
          name: screenshot
          path: screenshot-dir

      - name: Publish screenshot to gh-pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          TMPDIR=$(mktemp -d)
          if ! git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git clone "$REPO_URL" "$TMPDIR"
            cd "$TMPDIR"
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
          else
            git clone --branch gh-pages --depth 1 "$REPO_URL" "$TMPDIR"
            cd "$TMPDIR"
          fi
          cp "$GITHUB_WORKSPACE/screenshot-dir/screenshot.png" ./screenshot.png
          touch .nojekyll
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update plugin screenshot" || true
          git push origin gh-pages
          cd "$GITHUB_WORKSPACE"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: wet-diaper ${{ env.VERSION }}
          # Mark as pre-release when the version has a hyphen suffix
          # (e.g. v1.2.3-rc.1, v1.2.3-beta) — standard semver convention.
          prerelease: ${{ contains(env.VERSION, '-') }}
          generate_release_notes: true
          files: |
            WetDiaper-macOS-VST3.zip
            WetDiaper-macOS-AU.zip
            WetDiaper-Windows-VST3.zip
